# CH32V003 base OpenOCD configuration.
# Uses WCH-Link + WCH SDI transport via the target script.
#
# Notes:
# - The WCH fork provides `target/wch-riscv.cfg`, which already sets:
#     adapter driver wlinke
#     transport select sdi
#     flash bank wch_riscv
# - Keep runtime commands (init/reset/program/shutdown) outside this file.

source [find target/wch-riscv.cfg]

# Default probe speed for this project.
adapter speed 4000
