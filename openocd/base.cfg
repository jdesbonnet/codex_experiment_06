# Project-specific OpenOCD base configuration (no init/reset/shutdown).
# References:
# - OpenOCD config file syntax: http://openocd.org/doc/html/Config-File-Guidelines.html
# - LPC111x product datasheet, Rev. 9.2, Table 4: LPC1114FN28/102 has 32 kB flash.

# Use CMSIS-DAP probe (Pico running CMSIS-DAP firmware).
source [find interface/cmsis-dap.cfg]

# LPC111x Cortex-M0 target.
source [find target/lpc11xx.cfg]

transport select swd
adapter speed 1000
