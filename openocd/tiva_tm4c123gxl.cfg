# TI Tiva C Series LaunchPad (EK-TM4C123GXL) using the on-board ICDI debugger.
#
# The optional TI_ICDI_SERIAL Tcl variable can be set before sourcing this file
# to bind OpenOCD to a specific LaunchPad when multiple ICDI probes are present.

source [find interface/ti-icdi.cfg]

if { [info exists TI_ICDI_SERIAL] } {
    adapter serial $TI_ICDI_SERIAL
}

transport select jtag

set WORKAREASIZE 0x8000
set CHIPNAME tm4c123gh6pm
source [find target/stellaris.cfg]
